spring.application.name=smart-campus-maintenance-system
server.port=8080
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]
spring.profiles.default=dev
server.shutdown=graceful
server.forward-headers-strategy=framework
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,text/javascript,application/javascript
spring.lifecycle.timeout-per-shutdown-phase=20s
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Database (defaults to H2, override with DB_* env vars for MySQL)
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/smart-campus-maintenance;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT_MS:5000}
spring.data.redis.host=${REDIS_HOST:}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# File uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.upload.allowed-content-types=${APP_UPLOAD_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}
app.upload.max-file-size-bytes=${APP_UPLOAD_MAX_FILE_SIZE_BYTES:5242880}
app.upload.signed-url-ttl-seconds=${APP_UPLOAD_SIGNED_URL_TTL_SECONDS:300}
app.image.optimization.min-savings-percent=${APP_IMAGE_OPTIMIZATION_MIN_SAVINGS_PERCENT:5}
app.image.optimization.jpeg-quality=${APP_IMAGE_OPTIMIZATION_JPEG_QUALITY:85}
app.image.optimization.png-compression-quality=${APP_IMAGE_OPTIMIZATION_PNG_COMPRESSION_QUALITY:85}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}

# JWT
# 32+ chars required. Set JWT_SECRET in production.
jwt.secret=${JWT_SECRET:replace-this-with-a-very-long-32-char-secret-value}
jwt.expiration-ms=${JWT_EXPIRATION_MS:${JWT_EXPIRATION:900000}}

# Frontend URL (used in welcome/reset email links)
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# Email (Resend via SMTP is the recommended production default)
app.email.enabled=${APP_EMAIL_ENABLED:false}
app.email.from=${APP_EMAIL_FROM:no-reply@campusfix.local}
app.email.support-inbox=${APP_EMAIL_SUPPORT_INBOX:${app.email.from}}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Bootstrap users and demo data
app.seed.bootstrap-admin=${APP_SEED_BOOTSTRAP_ADMIN:false}
app.seed.demo-data=${APP_SEED_DEMO_DATA:false}
app.seed.demo-password=${APP_SEED_DEMO_PASSWORD:}
app.seed.admin.username=${APP_ADMIN_USERNAME:admin}
app.seed.admin.email=${APP_ADMIN_EMAIL:admin@campus.local}
app.seed.admin.full-name=${APP_ADMIN_FULL_NAME:Campus Admin}
app.seed.admin.password=${APP_ADMIN_PASSWORD:}
app.seed.admin.sync-existing=${APP_SEED_ADMIN_SYNC_EXISTING:false}
app.auth.verification-code-ttl-minutes=${APP_AUTH_VERIFICATION_CODE_TTL_MINUTES:15}
app.auth.reset-token-ttl-minutes=${APP_AUTH_RESET_TOKEN_TTL_MINUTES:60}
app.auth.verification-code-max-attempts=${APP_AUTH_VERIFICATION_CODE_MAX_ATTEMPTS:5}
app.auth.verification-resend-cooldown-seconds=${APP_AUTH_VERIFICATION_RESEND_COOLDOWN_SECONDS:60}
app.auth.reset-request-cooldown-seconds=${APP_AUTH_RESET_REQUEST_COOLDOWN_SECONDS:60}
app.auth.mfa.code-ttl-minutes=${APP_AUTH_MFA_CODE_TTL_MINUTES:10}
app.auth.mfa.code-max-attempts=${APP_AUTH_MFA_CODE_MAX_ATTEMPTS:5}
app.auth.mfa.resend-cooldown-seconds=${APP_AUTH_MFA_RESEND_COOLDOWN_SECONDS:45}
app.auth.mfa.required-roles=${APP_AUTH_MFA_REQUIRED_ROLES:}
app.auth.refresh-token-ttl-days=${APP_AUTH_REFRESH_TOKEN_TTL_DAYS:14}
app.auth.refresh-cookie-name=${APP_AUTH_REFRESH_COOKIE_NAME:campusfix_rt}
app.auth.refresh-cookie-same-site=${APP_AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
app.auth.refresh-cookie-secure=${APP_AUTH_REFRESH_COOKIE_SECURE:false}
app.auth.refresh-cookie-domain=${APP_AUTH_REFRESH_COOKIE_DOMAIN:}
app.auth.public-request-min-delay-ms=${APP_AUTH_PUBLIC_REQUEST_MIN_DELAY_MS:350}
app.auth.token-cleanup-cron=${APP_AUTH_TOKEN_CLEANUP_CRON:0 15 * * * *}
app.auth.used-token-retention-hours=${APP_AUTH_USED_TOKEN_RETENTION_HOURS:24}
app.auth.staff-invite-ttl-hours=${APP_AUTH_STAFF_INVITE_TTL_HOURS:48}
app.auth.staff-invite-cleanup-cron=${APP_AUTH_STAFF_INVITE_CLEANUP_CRON:0 35 * * * *}
app.broadcast.schedule-dispatch-fixed-delay-ms=${APP_BROADCAST_SCHEDULE_DISPATCH_DELAY_MS:30000}

# Public landing configuration
app.landing.support-hours=Mon-Fri, 08:00-20:00
app.landing.support-phone=+254 747988030
app.landing.support-timezone=EAT (UTC+03:00)
app.landing.sla.urgent-hours=2
app.landing.sla.standard-hours=24

# Email outbox
app.email.outbox.process-fixed-delay-ms=${APP_EMAIL_OUTBOX_PROCESS_FIXED_DELAY_MS:15000}
app.email.outbox.batch-size=${APP_EMAIL_OUTBOX_BATCH_SIZE:20}
app.email.outbox.max-attempts=${APP_EMAIL_OUTBOX_MAX_ATTEMPTS:6}
app.email.outbox.sent-retention-days=${APP_EMAIL_OUTBOX_SENT_RETENTION_DAYS:14}
app.email.outbox.cleanup-cron=${APP_EMAIL_OUTBOX_CLEANUP_CRON:0 25 * * * *}

# Security hardening
app.security.captcha.enabled=${APP_SECURITY_CAPTCHA_ENABLED:false}
app.security.captcha.turnstile.secret-key=${APP_SECURITY_CAPTCHA_TURNSTILE_SECRET_KEY:}
app.security.captcha.turnstile.site-key=${APP_SECURITY_CAPTCHA_TURNSTILE_SITE_KEY:}
app.security.trusted-proxies=${APP_SECURITY_TRUSTED_PROXIES:}
app.security.rate-limit.enabled=${APP_SECURITY_RATE_LIMIT_ENABLED:true}
app.security.rate-limit.redis-enabled=${APP_SECURITY_RATE_LIMIT_REDIS_ENABLED:false}
app.security.rate-limit.window-seconds=${APP_SECURITY_RATE_LIMIT_WINDOW_SECONDS:60}
app.security.rate-limit.login.ip-limit=${APP_SECURITY_RATE_LIMIT_LOGIN_IP_LIMIT:20}
app.security.rate-limit.login.account-limit=${APP_SECURITY_RATE_LIMIT_LOGIN_ACCOUNT_LIMIT:10}
app.security.rate-limit.register.ip-limit=${APP_SECURITY_RATE_LIMIT_REGISTER_IP_LIMIT:8}
app.security.rate-limit.forgot-password.ip-limit=${APP_SECURITY_RATE_LIMIT_FORGOT_PASSWORD_IP_LIMIT:8}
app.security.rate-limit.resend-verification.ip-limit=${APP_SECURITY_RATE_LIMIT_RESEND_VERIFICATION_IP_LIMIT:8}
app.security.rate-limit.support.ip-limit=${APP_SECURITY_RATE_LIMIT_SUPPORT_IP_LIMIT:6}
