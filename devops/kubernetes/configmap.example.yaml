apiVersion: v1
kind: ConfigMap
metadata:
  name: campusfix-backend-config
data:
  DB_URL: jdbc:mysql://mysql.default.svc.cluster.local:3306/Campus_Fix?allowPublicKeyRetrieval=true&useSSL=true&serverTimezone=UTC
  DB_USERNAME: campusfix
  FRONTEND_BASE_URL: https://app.example.com
  APP_CORS_ALLOWED_ORIGINS: https://app.example.com
  APP_EMAIL_ENABLED: "true"
  APP_EMAIL_FROM: no-reply@mail.example.com
  APP_EMAIL_SUPPORT_INBOX: support@example.com
  MAIL_HOST: smtp.resend.com
  MAIL_PORT: "587"
  MAIL_USERNAME: resend
  H2_CONSOLE_ENABLED: "false"
  APP_SEED_DEMO_DATA: "false"
  JPA_DDL_AUTO: validate
