apiVersion: apps/v1
kind: Deployment
metadata:
  name: campusfix-backend
  labels:
    app.kubernetes.io/name: campusfix-backend
spec:
  revisionHistoryLimit: 5
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: campusfix-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: campusfix-backend
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: backend
          image: ghcr.io/your-org/campusfix-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: APP_UPLOAD_DIR
              value: /var/opt/campusfix/uploads
          envFrom:
            - configMapRef:
                name: campusfix-backend-config
            - secretRef:
                name: campusfix-backend-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: uploads
              mountPath: /var/opt/campusfix/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: campusfix-uploads
