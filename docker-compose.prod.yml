services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?Set MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER:?Set MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?Set REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../devops/docker/Dockerfile-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:?Set MYSQL_DATABASE}?allowPublicKeyRetrieval=true&useSSL=true&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER:?Set MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD}
      H2_CONSOLE_ENABLED: "false"
      APP_SEED_BOOTSTRAP_ADMIN: ${APP_SEED_BOOTSTRAP_ADMIN:-false}
      APP_SEED_ADMIN_SYNC_EXISTING: "false"
      APP_SEED_DEMO_DATA: "false"
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-admin@example.com}
      APP_ADMIN_FULL_NAME: ${APP_ADMIN_FULL_NAME:-Campus Admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:?Set FRONTEND_BASE_URL}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:?Set APP_CORS_ALLOWED_ORIGINS}
      APP_EMAIL_ENABLED: ${APP_EMAIL_ENABLED:-true}
      APP_EMAIL_FROM: ${APP_EMAIL_FROM:?Set APP_EMAIL_FROM}
      APP_EMAIL_SUPPORT_INBOX: ${APP_EMAIL_SUPPORT_INBOX:?Set APP_EMAIL_SUPPORT_INBOX}
      MAIL_HOST: ${MAIL_HOST:-smtp.resend.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-resend}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?Set MAIL_PASSWORD}
      APP_UPLOAD_DIR: /app/uploads
      APP_UPLOAD_SIGNING_SECRET: ${APP_UPLOAD_SIGNING_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      APP_AUTH_REFRESH_COOKIE_SECURE: "true"
      APP_SECURITY_RATE_LIMIT_REDIS_ENABLED: "true"
      APP_SECURITY_TRUSTED_PROXIES: ${APP_SECURITY_TRUSTED_PROXIES:-}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: ../devops/docker/Dockerfile-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      FRONTEND_API_UPSTREAM: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  backend_uploads:
